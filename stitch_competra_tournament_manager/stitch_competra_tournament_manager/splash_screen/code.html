<style>
        .football-pitch-bg {
            background-image: 
                linear-gradient(rgba(10, 31, 20, 0.9), rgba(10, 31, 20, 0.9)),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 40px,
                    rgba(255, 255, 255, 0.03) 40px,
                    rgba(255, 255, 255, 0.03) 80px
                );
        }
        
        .pulse-logo {
            animation: pulse-scale 3s infinite alternate ease-in-out;
        }

        @keyframes pulse-scale {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.9s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Subtle football pitch pattern background -->
<div class="absolute inset-0 football-pitch-bg z-0 pointer-events-none"></div>
<!-- Vignette effect for depth -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-background z-0 pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-background opacity-80 z-0 pointer-events-none"></div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center text-center px-container-margin w-full max-w-md mx-auto">
<!-- Logo / Icon Area (Optional visual anchor) -->
<div class="mb-stack-lg fade-in-up delay-1">
<div class="w-24 h-24 rounded-full bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shadow-lg relative overflow-hidden">
<span class="material-symbols-outlined text-display text-primary absolute z-10" style="font-variation-settings: 'FILL' 1;">
                    sports_soccer
                </span>
<div class="absolute inset-0 bg-primary/10 rounded-full blur-md"></div>
</div>
</div>
<!-- Wordmark -->
<h1 class="font-display text-display text-primary mb-stack-sm tracking-tight pulse-logo fade-in-up delay-2">
            COMPETRA
        </h1>
<!-- Tagline -->
<p class="font-headline-md text-headline-md text-on-surface-variant fade-in-up delay-3 max-w-[280px]">
            Your tournament. Your rules.
        </p>
</div>
<!-- Loading Indicator (Subtle) -->
<div class="absolute bottom-16 left-0 right-0 flex justify-center z-10 fade-in-up delay-3">
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary/40 animate-pulse" style="animation-delay: 0s;"></div>
<div class="w-2 h-2 rounded-full bg-primary/70 animate-pulse" style="animation-delay: 0.2s;"></div>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse" style="animation-delay: 0.4s;"></div>
</div>
</div>
<!-- Interactive script to handle tap to continue (mock functionality) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: Add a tap-to-continue interaction or automatic redirect
            document.body.addEventListener('click', () => {
                // In a real app, this would navigate to the next screen
                const content = document.querySelector('.z-10');
                content.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                content.style.opacity = '0';
                content.style.transform = 'scale(0.95)';
                
                // Simulate navigation after animation
                setTimeout(() => {
                    console.log('Navigating to next screen...');
                    // window.location.href = '/next-screen'; 
                }, 500);
            });
        });
    </script>
