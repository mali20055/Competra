<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>COMPETRA - Login / Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            theme: {

                        "surface-dim": "#05170d",
                        "surface-variant": "#27392d",
                        "surface-tint": "#62df7d",
                        "on-primary-container": "#003111",
                        "surface-container-low": "#0d1f15",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#006e2d",
                        "on-primary-fixed": "#002109",
                        "surface-container": "#112319",
                        "secondary-fixed": "#6dfe9c",
                        "surface-container-lowest": "#021108",
                        "on-tertiary-fixed": "#032112",
                        "surface-bright": "#2b3d31",
                        "error-container": "#93000a",
                        "surface-container-high": "#1c2e23",
                        "outline": "#879485",
                        "on-surface-variant": "#bdcaba",
                        "on-tertiary-container": "#122f20",
                        "on-secondary": "#003919",
                        "primary-container": "#1ca64d",
                        "tertiary-fixed": "#c9ebd3",
                        "primary-fixed-dim": "#62df7d",
                        "error": "#ffb4ab",
                        "inverse-surface": "#d2e8d7",
                        "on-secondary-container": "#003e1c",
                        "on-primary": "#003914",
                        "surface-container-highest": "#27392d",
                        "background": "#05170d",
                        "secondary": "#4de082",
                        "secondary-fixed-dim": "#4de082",
                        "on-background": "#d2e8d7",
                        "on-primary-fixed-variant": "#005320",
                        "tertiary-fixed-dim": "#adceb8",
                        "on-surface": "#d2e8d7",
                        "on-secondary-fixed": "#00210c",
                        "on-tertiary-fixed-variant": "#2f4d3c",

                        "on-error": "#690005",
                        "tertiary-container": "#789883",

                    },
                    "borderRadius": {

                    "spacing": {

                    "fontFamily": {

                }
            }
        }

<style>
        /* Custom styles for pitch line pattern and animated underline */
        .bg-pitch-pattern {
            background-image: linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, .03) 25%, rgba(255, 255, 255, .03) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .03) 75%, rgba(255, 255, 255, .03) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, .03) 25%, rgba(255, 255, 255, .03) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .03) 75%, rgba(255, 255, 255, .03) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }
        
        .tab-indicator {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0D2B1C inset !important;
            -webkit-text-fill-color: #d2e8d7 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-pitch-pattern font-body-md antialiased">
<!-- Ambient Glow Effects -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Main Container -->
<main class="w-full max-w-md px-container-margin z-10 flex flex-col items-center gap-stack-lg">
<!-- Logo Header -->
<header class="flex flex-col items-center gap-stack-sm w-full mb-4">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shadow-lg shadow-black/50">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h1 class="font-display text-display text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">COMPETRA</h1>
</header>
<!-- Auth Card -->
<div class="w-full bg-surface-container rounded-xl border border-outline-variant/20 shadow-2xl overflow-hidden backdrop-blur-sm">
<!-- Tabs -->
<div class="relative flex w-full border-b border-outline-variant/20">
<button class="flex-1 py-4 font-label-lg text-label-lg text-primary transition-colors focus:outline-none" id="tab-login" onclick="switchTab('login')">
                    Giriş Yap
                </button>
<button class="flex-1 py-4 font-label-lg text-label-lg text-on-surface-variant transition-colors focus:outline-none" id="tab-register" onclick="switchTab('register')">
                    Kayıt Ol
                </button>
<!-- Animated Underline -->
<div class="absolute bottom-0 left-0 w-1/2 h-1 bg-primary rounded-t-full tab-indicator transform translate-x-0" id="tab-indicator"></div>
</div>
<div class="p-container-margin relative overflow-hidden min-h-[320px]">
<!-- Login Form -->
<form class="flex flex-col gap-stack-md w-full transition-transform duration-300 absolute inset-0 p-container-margin transform translate-x-0 opacity-100" id="form-login">
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="login-username">Kullanıcı Adı</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="login-username" placeholder="Kullanıcı adınızı girin" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="login-password">Şifre</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-3 pl-10 pr-10 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="login-password" placeholder="Şifrenizi girin" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary focus:outline-none transition-colors" onclick="togglePassword('login-password', 'login-pwd-icon')" type="button">
<span class="material-symbols-outlined" id="login-pwd-icon">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end mt-[-8px]">
<a class="font-label-md text-label-md text-primary hover:text-secondary transition-colors" href="#">Şifremi Unuttum</a>
</div>
<button class="mt-4 w-full bg-primary hover:bg-secondary-container text-on-primary font-label-lg text-label-lg py-3 px-6 rounded-lg shadow-[0_0_15px_rgba(98,223,125,0.3)] hover:shadow-[0_0_20px_rgba(98,223,125,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Giriş Yap
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Register Form -->
<form class="flex flex-col gap-stack-md w-full transition-transform duration-300 absolute inset-0 p-container-margin transform translate-x-full opacity-0 pointer-events-none" id="form-register">
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-username">Kullanıcı Adı</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="reg-username" placeholder="Kullanıcı adı belirleyin" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-password">Şifre</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-3 pl-10 pr-10 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="reg-password" placeholder="Şifre belirleyin" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary focus:outline-none transition-colors" onclick="togglePassword('reg-password', 'reg-pwd-icon')" type="button">
<span class="material-symbols-outlined" id="reg-pwd-icon">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-password-confirm">Şifre Tekrar</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock_reset</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-3 pl-10 pr-10 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="reg-password-confirm" placeholder="Şifrenizi tekrar girin" required="" type="password"/>
</div>
</div>
<button class="mt-4 w-full bg-transparent border border-outline-variant text-on-surface hover:border-primary hover:text-primary font-label-lg text-label-lg py-3 px-6 rounded-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Kayıt Ol
                        <span class="material-symbols-outlined text-[20px]">person_add</span>
</button>
</form>
</div>
</div>
<!-- Guest Continuation -->
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2 group mt-4">
            Misafir Devam Et
            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</main>
<script>
        function switchTab(tab) {
            const loginTabBtn = document.getElementById('tab-login');
            const registerTabBtn = document.getElementById('tab-register');
            const indicator = document.getElementById('tab-indicator');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (tab === 'login') {
                loginTabBtn.classList.add('text-primary');
                loginTabBtn.classList.remove('text-on-surface-variant');
                registerTabBtn.classList.add('text-on-surface-variant');
                registerTabBtn.classList.remove('text-primary');
                
                indicator.style.transform = 'translateX(0)';
                
                formLogin.style.transform = 'translateX(0)';
                formLogin.style.opacity = '1';
                formLogin.style.pointerEvents = 'auto';
                
                formRegister.style.transform = 'translateX(100%)';
                formRegister.style.opacity = '0';
                formRegister.style.pointerEvents = 'none';
            } else {
                registerTabBtn.classList.add('text-primary');
                registerTabBtn.classList.remove('text-on-surface-variant');
                loginTabBtn.classList.add('text-on-surface-variant');
                loginTabBtn.classList.remove('text-primary');
                
                indicator.style.transform = 'translateX(100%)';
                
                formLogin.style.transform = 'translateX(-100%)';
                formLogin.style.opacity = '0';
                formLogin.style.pointerEvents = 'none';
                
                formRegister.style.transform = 'translateX(0)';
                formRegister.style.opacity = '1';
                formRegister.style.pointerEvents = 'auto';
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body></html>
